name: Feature request
description: Propose a new feature or a change to existing behavior.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim the [project plan](https://github.com/ardentcascades/understoria/blob/main/README.md#roadmap)
        to see if your idea is already on the roadmap, and the
        [Code of Conduct](https://github.com/ardentcascades/understoria/blob/main/CODE_OF_CONDUCT.md)
        + [Governance doc](https://github.com/ardentcascades/understoria/blob/main/GOVERNANCE.md)
        — changes that affect community process should go through the
        community-proposal template, not this one.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Start with the human problem. Who has it? When does it
        happen? What do they do today to work around it?
      placeholder: |
        e.g. Members on slow connections in our pilot can't tell
        whether their post submitted or not — there's no feedback
        until the next refresh.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        Describe the feature or change. UI mock-ups, code sketches,
        or a description of the new interface are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other ways you thought about solving this and why they're
        not the right call.
    validations:
      required: false

  - type: textarea
    id: invariants
    attributes:
      label: Design invariants
      description: |
        How does this proposal fit with the project's design
        principles? (One hour = one hour of credit, no
        leaderboards, no skill multipliers, minimal data
        collection, etc.)
    validations:
      required: false

  - type: dropdown
    id: agent
    attributes:
      label: Which workstream / agent does this fit under?
      options:
        - "Agent 1 — Core App"
        - "Agent 2 — Crypto & Identity"
        - "Agent 3 — Federation & Infrastructure"
        - "Agent 4 — Security & Opsec"
        - "Agent 5 — Governance"
        - "Agent 6 — Gamification & Engagement"
        - "Agent 7 — Organizing Integration"
        - "Agent 8 — Testing & Pilot"
        - "Agent 9 — Documentation & Education"
        - "Agent 10 — Community Projects & Momentum"
        - "Other / cross-cutting"
        - "Not sure"
    validations:
      required: true
