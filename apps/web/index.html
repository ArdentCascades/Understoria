<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <!-- iOS ignores manifest icons; A2HS uses this instead. -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!--
      iOS PWA splash screens. iOS does NOT read the manifest's
      background_color for the launch image; it requires a matching
      apple-touch-startup-image per device-size + orientation. Without
      these, members see a blank white screen between tap and first
      paint. Device matrix sourced from onderceylan/pwa-asset-generator
      (cross-checked against Apple's published display specs); PNGs are
      generated by scripts/generate-icons.mjs.
    -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-iphone-se-portrait.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
      href="/splash/splash-iphone-se-landscape.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-iphone-14-portrait.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
      href="/splash/splash-iphone-14-landscape.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-iphone-14-pro-portrait.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
      href="/splash/splash-iphone-14-pro-landscape.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-iphone-14-pro-max-portrait.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
      href="/splash/splash-iphone-14-pro-max-landscape.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-ipad-11-portrait.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
      href="/splash/splash-ipad-11-landscape.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-ipad-12-9-portrait.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
      href="/splash/splash-ipad-12-9-landscape.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#15803d" />
    <meta
      name="description"
      content="Understoria — a federated, privacy-first mutual aid timebank. One hour of help equals one hour of help."
    />
    <title>Understoria — Mutual Aid Timebank</title>
    <!--
      No-FOUC theme application. Runs synchronously during HTML
      parsing so the dark class is on <html> before the first
      paint. localStorage is a write-through cache of the Dexie
      record (the source of truth) — see apps/web/src/lib/theme.ts.
      Missing / malformed values fall back to "system".
    -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("understoria.theme");
          if (pref !== "light" && pref !== "dark") pref = "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              typeof matchMedia === "function" &&
              matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
          var size = localStorage.getItem("understoria.text-size");
          // "auto" or missing / unknown resolves via viewport. The
          // (min-width: 1024px) query mirrors Tailwind's `lg`
          // breakpoint; see lib/textSize.ts (WIDE_VIEWPORT_QUERY).
          if (size !== "default" && size !== "larger" && size !== "largest") {
            size =
              typeof matchMedia === "function" &&
              matchMedia("(min-width: 1024px)").matches
                ? "larger"
                : "default";
          }
          if (size === "larger")
            document.documentElement.classList.add("text-larger");
          else if (size === "largest")
            document.documentElement.classList.add("text-largest");
          // Phase 3.3 density. Opt-in only — "default" / missing /
          // unknown means comfortable padding (the launch behavior).
          var density = localStorage.getItem("understoria.density");
          if (density === "compact")
            document.documentElement.classList.add("density-compact");
        } catch (e) {
          /* private-mode / quota-exceeded — fall back to defaults */
        }
      })();
    </script>
  </head>
  <body class="bg-moss-50 text-moss-900 dark:bg-moss-950 dark:text-moss-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
