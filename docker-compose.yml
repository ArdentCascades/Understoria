# docker-compose for a single-host Understoria deployment (Linode or
# any Docker-capable VPS). Three services:
#
#   - web         one-shot build that copies the PWA dist into a shared
#                 volume, then exits. Re-run on redeploy.
#   - understoria Fastify community node. Persists SQLite to a named
#                 volume; not exposed on the host (only Caddy reaches it).
#   - caddy       TLS termination + static PWA + /api reverse proxy.
#                 The ONLY service that binds host ports.
#
# Secrets and per-deploy values come from `.env` (gitignored). Copy
# `.env.example` and fill it in before `docker compose up -d`.
#
# See docs/deploy-linode.md for the end-to-end runbook.

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Build stamp shown in Settings (docs/operator-guide.md §6).
        # Set it before building: VITE_BUILD_STAMP=$(git rev-parse --short HEAD) docker compose build web
        VITE_BUILD_STAMP: ${VITE_BUILD_STAMP:-}
    image: understoria/web:${UNDERSTORIA_VERSION:-0.3.0}
    container_name: understoria-web-build
    restart: "no"
    volumes:
      - web-dist:/out
    # No network needed — purely a file copy from /dist (baked in) to
    # the mounted /out volume.
    network_mode: "none"

  understoria:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: understoria/server:${UNDERSTORIA_VERSION:-0.3.0}
    container_name: understoria
    restart: unless-stopped
    # No host port binding — Caddy reaches the server on the internal
    # compose network. This is the production posture; for local
    # debugging on a developer machine you can add `ports: - "8787:8787"`.
    expose:
      - "8787"
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      DATABASE_PATH: "/data/understoria.db"
      # Stable identifier for this node, stamped on every federated
      # record and bound to the published system key in GET /config
      # (autoConfirmedBy: "system:<NODE_ID>"). MUST be unique per node
      # in a federation — if left unset every node defaults to
      # "node_local", colliding the §4 nodeId↔key binding and
      # misattributing records. Set it in .env before federating.
      NODE_ID: "${NODE_ID:-node_local}"
      # MUST be your real PWA origin in production. A wildcard here is
      # a real bug: /auto-confirm is the system-key endpoint and a
      # permissive CORS in front of it widens its attack surface for
      # browser-based callers from other origins.
      CORS_ORIGIN: "https://${DOMAIN}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-60}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_REQUEST_PATHS: "${LOG_REQUEST_PATHS:-false}"
      # Operator identity surfaced on GET /config so members can see
      # who is running the node. Optional but recommended.
      OPERATOR_NAME: "${OPERATOR_NAME:-}"
      OPERATOR_CONTACT: "${OPERATOR_CONTACT:-}"
      OPERATOR_FUNDING_NOTE: "${OPERATOR_FUNDING_NOTE:-}"
      # Auto-confirm system key. Generate with the one-liner in
      # docs/deploy-linode.md §3 and paste the printed value into
      # .env. An empty string disables the auto-confirm endpoint
      # entirely (members never auto-credit; manual confirm still works).
      NODE_SYSTEM_SECRET_KEY: "${NODE_SYSTEM_SECRET_KEY:-}"
      # Retired system pubkeys from past rotations, published in
      # GET /config so pulling peers keep verifying pre-rotation
      # records. JSON array of {"pubkey","retiredAt"}. Empty until you
      # rotate. See docs/system-key-rotation.md.
      NODE_SYSTEM_KEY_HISTORY: "${NODE_SYSTEM_KEY_HISTORY:-}"
      AUTO_CONFIRM_MIN_HOURS: "${AUTO_CONFIRM_MIN_HOURS:-168}"
      # How long sealed DM envelopes wait on the relay shelf before
      # pruning (docs/message-relay.md §4.3). Days; 0 disables.
      MESSAGE_RETENTION_DAYS: "${MESSAGE_RETENTION_DAYS:-30}"
      # Comma-separated list of peer node URLs (each MUST include the
      # /api prefix if the peer follows the same single-domain layout).
      # Leave empty for a solo launch.
      PEER_NODE_URLS: "${PEER_NODE_URLS:-}"
      # How often the pull worker hits each peer (ms). Default 5 min.
      PEER_PULL_INTERVAL_MS: "${PEER_PULL_INTERVAL_MS:-300000}"
      # ---- Membership & governance ------------------------------------
      # Trust roots for the membership resolver: comma-separated base64
      # public keys of the founding member(s). REQUIRED for the
      # member-gated write surfaces (proposals, votes, closures, member
      # removals) — with no founder keys, NO key counts as a member and
      # every governance write is refused with 403 not_a_member. Each
      # member's public key is on their Profile page. See
      # docs/operator-guide.md.
      NODE_FOUNDER_KEYS: "${NODE_FOUNDER_KEYS:-}"
      # Co-signatures required on a member removal / reinstatement.
      # MUST match across a mirror set. docs/member-removal.md §2.
      REMOVAL_QUORUM: "${REMOVAL_QUORUM:-3}"
      # ---- Reads & at-rest protection ---------------------------------
      # Member-authenticated reads ("off" | "on"). Flip to "on" only
      # after every member runs a signing build — rollout runbook in
      # docs/operator-guide.md. "on" requires NODE_FOUNDER_KEYS (boot
      # refuses otherwise).
      READ_AUTH: "${READ_AUTH:-on}"
      # Encryption-at-rest key for the SQLite file. Unset keeps
      # plaintext. Keep a copy of the key AWAY from the backups — a
      # backup without its key is a brick, which is the point.
      DATABASE_KEY: "${DATABASE_KEY:-}"
      # JSON map {"https://peer.example":"<token>"} for reads against
      # READ_AUTH=on peers (and inbound peer reads).
      PEER_READ_TOKENS: "${PEER_READ_TOKENS:-}"
      # Honor X-Forwarded-For from the reverse proxy for rate limiting.
      # Any value fastify's trustProxy accepts; empty = off.
      TRUST_PROXY: "${TRUST_PROXY:-}"
      # ---- Mirrors (docs/community-resilience.md) ----------------------
      # Origin nodes this node mirrors (comma-separated URLs).
      MIRROR_NODE_URLS: "${MIRROR_NODE_URLS:-}"
      # Mirror URLs this node publishes on GET /config for failover.
      MIRROR_ANNOUNCE_URLS: "${MIRROR_ANNOUNCE_URLS:-}"
      MIRROR_PULL_INTERVAL_MS: "${MIRROR_PULL_INTERVAL_MS:-}"
      # JSON map {"https://mirror.example":"<token>"} for pulling from
      # READ_AUTH=on mirrors.
      MIRROR_READ_TOKENS: "${MIRROR_READ_TOKENS:-}"
      # ---- Disk-fill backstops (docs/operator-guide.md) ----------------
      TABLE_ROW_CEILING: "${TABLE_ROW_CEILING:-}"
      PER_KEY_ROW_CEILING: "${PER_KEY_ROW_CEILING:-}"
      # ---- Recovery & rollout flips ------------------------------------
      # Re-seed acceptance window (RFC3339 or epoch ms) — set only
      # while restoring a community onto this fresh node, then unset.
      # docs/community-reseed.md.
      RESEED_GRACE_UNTIL: "${RESEED_GRACE_UNTIL:-}"
      # JSON array of {"nodeId","current","history"} entries — e.g.
      # [{"nodeId":"node_old","current":"<pubkey>","history":[...]}] —
      # naming lost nodes' system keys trusted during a re-seed (the
      # server refuses to boot on any other shape). Set alongside
      # RESEED_GRACE_UNTIL, then unset.
      TRUSTED_SYSTEM_KEYS: "${TRUSTED_SYSTEM_KEYS:-}"
      # Refuse auto-confirm requests without a signed awaiting-
      # transition artifact ("1" to enable). Flip only after every
      # member runs an artifact-pushing build. docs/auto-confirm-key.md §5.
      AUTO_CONFIRM_REQUIRE_TRANSITION: "${AUTO_CONFIRM_REQUIRE_TRANSITION:-}"
    volumes:
      - understoria-data:/data
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Cap container logs so they can't fill the disk on a busy node.
    # Default driver retains forever — three 10MB files = 30MB max
    # per container, which is enough for diagnosing the last hour
    # or two of activity at typical pilot load. Operators wanting
    # longer retention should ship logs to a centralised collector
    # via journald/syslog.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.8-alpine
    container_name: understoria-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: "${DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - web-dist:/usr/share/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      web:
        condition: service_completed_successfully
      understoria:
        condition: service_healthy

volumes:
  understoria-data:
  web-dist:
  caddy-data:
  caddy-config:
